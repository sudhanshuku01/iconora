name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @iconora/core build

      - name: Build react
        run: pnpm --filter @iconora/react build

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @iconora/core build

      - name: Build react
        run: pnpm --filter @iconora/react build

      - name: Publish core
        working-directory: packages/core
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view $PACKAGE_NAME@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "⏭️  $PACKAGE_NAME@$PACKAGE_VERSION already published, skipping."
          else
            echo "🚀 Publishing $PACKAGE_NAME@$PACKAGE_VERSION"
            pnpm publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish react
        working-directory: packages/react
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view $PACKAGE_NAME@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "⏭️  $PACKAGE_NAME@$PACKAGE_VERSION already published, skipping."
          else
            echo "🚀 Publishing $PACKAGE_NAME@$PACKAGE_VERSION"
            pnpm publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
